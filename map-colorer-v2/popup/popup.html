<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Map Colorer Argentina</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 280px; font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; color: #202124; background: #fff; }

.header {
  background: linear-gradient(135deg, #1a6b3c 0%, #0f4d2c 100%);
  padding: 12px 14px; display: flex; align-items: center; gap: 10px;
}
.header-icon { width: 30px; height: 30px; background: rgba(255,255,255,0.18); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.header h1 { font-size: 13px; font-weight: 600; color: #fff; }
.header p  { font-size: 10px; color: rgba(255,255,255,.7); margin-top: 1px; }

.status-bar { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: #f8f9fa; border-bottom: 1px solid #f1f3f4; font-size: 11px; color: #5f6368; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-dot.active   { background: #34a853; }
.status-dot.inactive { background: #ea4335; }

.section { padding: 8px 14px 4px; border-bottom: 1px solid #f1f3f4; }
.section-title { font-size: 10px; font-weight: 600; color: #80868b; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 7px; }

.layer-row { display: flex; align-items: center; gap: 7px; padding: 4px 0; }
.swatch { width: 15px; height: 15px; border-radius: 3px; border: 1px solid rgba(0,0,0,.12); cursor: pointer; flex-shrink: 0; transition: transform .12s; }
.swatch:hover { transform: scale(1.2); }
.layer-name { flex: 1; font-size: 12px; color: #3c4043; }

.toggle { position: relative; width: 30px; height: 16px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track { position: absolute; inset: 0; border-radius: 16px; background: #dadce0; cursor: pointer; transition: background .2s; }
.toggle input:checked + .toggle-track { background: #1a6b3c; }
.toggle-track::after { content: ''; position: absolute; width: 12px; height: 12px; top: 2px; left: 2px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle input:checked + .toggle-track::after { transform: translateX(14px); }

.opacity-row { display: flex; align-items: center; gap: 6px; padding: 1px 0 5px 22px; }
.opacity-row label { font-size: 10px; color: #80868b; min-width: 34px; }
.opacity-row input[type=range] { flex: 1; accent-color: #1a6b3c; cursor: pointer; }
.opacity-val { font-size: 10px; color: #5f6368; min-width: 30px; text-align: right; }

.toggle-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.toggle-row-label { flex: 1; font-size: 11px; color: #5f6368; }

.info-box { background: #e8f5e9; border-left: 3px solid #1a6b3c; padding: 7px 10px; margin: 8px 14px 0; border-radius: 0 5px 5px 0; font-size: 11px; color: #2e7d32; line-height: 1.4; }

.footer { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
.btn { width: 100%; padding: 8px 0; font-size: 12px; font-family: inherit; border-radius: 6px; cursor: pointer; border: 1px solid #dadce0; background: #fff; color: #3c4043; transition: background .15s; }
.btn:hover { background: #f1f3f4; }
.btn.primary { background: #1a6b3c; color: #fff; border-color: #1a6b3c; font-weight: 600; }
.btn.primary:hover { background: #155c33; }
.btn.secondary { background: #e8f0fe; color: #1a73e8; border-color: #e8f0fe; }
.btn.secondary:hover { background: #d2e3fc; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🗺</div>
  <div>
    <h1>Map Colorer Argentina</h1>
    <p>Capas geográficas · Datos IGN oficiales</p>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot inactive" id="status-dot"></div>
  <span id="status-text">Verificando pestaña activa…</span>
</div>

<div class="section">
  <div class="section-title">Capas de datos</div>

  <div class="layer-row">
    <div class="swatch" id="swatch-provincias" style="background:#3399FF"></div>
    <span class="layer-name">Provincias (24)</span>
    <label class="toggle"><input type="checkbox" id="tog-provincias" checked><span class="toggle-track"></span></label>
  </div>
  <div class="opacity-row" id="oprow-provincias">
    <label>Opac.</label>
    <input type="range" id="op-provincias" min="5" max="80" value="40">
    <span class="opacity-val" id="opv-provincias">40%</span>
  </div>

  <div class="layer-row">
    <div class="swatch" id="swatch-municipios" style="background:#FF6633"></div>
    <span class="layer-name">Municipios Argentina (2082)</span>
    <label class="toggle"><input type="checkbox" id="tog-municipios"><span class="toggle-track"></span></label>
  </div>
  <div class="opacity-row" id="oprow-municipios" style="display:none">
    <label>Opac.</label>
    <input type="range" id="op-municipios" min="5" max="80" value="40">
    <span class="opacity-val" id="opv-municipios">40%</span>
  </div>

  <div class="layer-row">
    <div class="swatch" id="swatch-barrios" style="background:#66AA00"></div>
    <span class="layer-name">Barrios CABA (48)</span>
    <label class="toggle"><input type="checkbox" id="tog-barrios"><span class="toggle-track"></span></label>
  </div>
  <div class="opacity-row" id="oprow-barrios" style="display:none">
    <label>Opac.</label>
    <input type="range" id="op-barrios" min="5" max="80" value="45">
    <span class="opacity-val" id="opv-barrios">45%</span>
  </div>

  <div class="layer-row">
    <div class="swatch" id="swatch-regiones" style="background:#CC8800"></div>
    <span class="layer-name">Regiones geográficas (5)</span>
    <label class="toggle"><input type="checkbox" id="tog-regiones"><span class="toggle-track"></span></label>
  </div>
  <div class="opacity-row" id="oprow-regiones" style="display:none">
    <label>Opac.</label>
    <input type="range" id="op-regiones" min="5" max="80" value="30">
    <span class="opacity-val" id="opv-regiones">30%</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Opciones</div>
  <div class="toggle-row">
    <label class="toggle"><input type="checkbox" id="tog-fourcolors"><span class="toggle-track"></span></label>
    <span class="toggle-row-label">Teorema 4 colores (adyacencias)</span>
  </div>
</div>

<div class="info-box" id="info-box" style="display:none">✓ Overlay activo en esta pestaña</div>

<div class="footer">
  <button class="btn primary" id="btn-apply">Aplicar en mapa</button>
  <button class="btn secondary" id="btn-osm">Abrir en OpenStreetMap ↗</button>
</div>

<script src="popup.js"></script>
</body>
</html>
